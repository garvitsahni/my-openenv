name: Deploy to Hugging Face Space

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HF_SPACE_ID: Garvit0012/my-openenv
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required config
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "Missing repo secret HF_TOKEN"
            exit 1
          fi

      - name: Install Git LFS
        run: |
          git lfs install

      - name: Clone Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          HF_TOKEN_CLEAN="$(printf '%s' "$HF_TOKEN" | tr -d '\r\n')"
          if [ -z "$HF_TOKEN_CLEAN" ]; then
            echo "HF_TOKEN is empty after sanitizing line breaks"
            exit 1
          fi
          git clone "https://oauth2:${HF_TOKEN_CLEAN}@huggingface.co/spaces/${HF_SPACE_ID}" hf-space

      - name: Sync app files to Space
        run: |
          rsync -av --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            "workbench/" "hf-space/"

      - name: Commit and push if changed
        working-directory: hf-space
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to deploy."
            exit 0
          fi
          git commit -m "Deploy from GitHub ${GITHUB_SHA}"
          git push origin main
